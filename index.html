<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Budget</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="budget-item">
            <span class="label">Budget</span>
            <span class="amount">0 €</span>
        </div>
        <div class="budget-item">
            <span class="label">Épargne</span>
            <span class="amount">0 €</span>
        </div>
    </header>

    <main>
        <button class="edit-btn" id="editBtn" title="Modifier">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 7.5-7.5z"/>
            </svg>
        </button>
        <button class="import-btn" id="importBtn" title="Importer">+</button>
        
        <div class="chart-card pie-chart">
            <h3>Dépenses par catégorie</h3>
            <div class="chart-placeholder">Camembert</div>
        </div>
    </main>

    <footer>
        <div class="footer-buttons">
            <button class="footer-btn chart-bar-btn" id="chartBarBtn" title="Diagramme">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 12h2v8H3zm4-8h2v16H7zm4 4h2v12h-2zm4-6h2v18h-2z"/>
                </svg>
            </button>
            <button class="footer-btn home-btn" id="homeBtn" title="Accueil">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
            </button>
            <button class="footer-btn settings-btn" id="settingsBtn" title="Paramètres">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.73-2.99c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.65-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.88c-.24 0-.43.17-.47.41l-.36 2.54c-.62.24-1.15.57-1.65.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.73 2.99c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.65.94l.36 2.54c.04.24.24.41.48.41h3.88c.24 0 .44-.17.47-.41l.36-2.54c.62-.24 1.15-.56 1.65-.94l2.39.96c.22.08.47 0 .59-.22l1.73-2.99c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
            </button>
        </div>
    </footer>
    
    <script>
        // Script pour afficher le mois actuel - SUPPRIMÉ
    </script>
</body>
</html>
